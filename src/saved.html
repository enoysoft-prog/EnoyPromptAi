<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Saved Prompts — PromptVault</title>
<meta name="robots" content="noindex"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./css/style.css"/>
</head>
<body>
<script type="module">
import { auth }              from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getUserProfile }    from "./js/auth.js";
import { getAppConfig, getPromptById } from "./js/db.js";
import { toggleSavePrompt }  from "./js/coins.js";
import { injectNav, injectFooter } from "./js/nav.js";
import { renderPromptCard, toast } from "./js/ui.js";

(async () => {
  const cfg = await getAppConfig().catch(()=>({}));
  injectNav(cfg);

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.replace("./auth.html?from=saved.html"); return; }
    const profile = await getUserProfile(user.uid);
    const ids = profile?.savedPrompts || [];
    const grid = document.getElementById("saved-grid");
    if (!grid) return;

    if (!ids.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;">
        <div style="font-size:3rem;margin-bottom:16px;">❤</div>
        <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:8px;">No saved prompts yet</h2>
        <p style="color:var(--text2);margin-bottom:20px;">Click the ❤ on any prompt to save it here.</p>
        <a href="./prompts.html" class="btn-primary" style="text-decoration:none;display:inline-block;">Browse Prompts</a>
      </div>`;
      return;
    }

    grid.innerHTML = `<div style="grid-column:1/-1;margin-bottom:8px;"><p style="font-size:14px;color:var(--text2);">${ids.length} saved prompt${ids.length!==1?"s":""}</p></div>`;
    const prompts = await Promise.all(ids.map(id => getPromptById(id).catch(()=>null)));
    prompts.filter(Boolean).forEach(p => {
      grid.insertAdjacentHTML("beforeend", renderPromptCard(p, profile));
    });
  });

  injectFooter(cfg);
})();
</script>
<main style="max-width:1200px;margin:0 auto;padding:40px 20px 80px;">
  <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:28px;">❤ Saved Prompts</h1>
  <div class="prompts-grid" id="saved-grid">
    <div class="prompt-card skeleton-card"><div class="sk-img" style="min-height:180px;"></div><div class="card-body"><div class="sk-line sk-line-sm"></div><div class="sk-line sk-line-lg"></div></div></div>
    <div class="prompt-card skeleton-card"><div class="sk-img" style="min-height:180px;"></div><div class="card-body"><div class="sk-line sk-line-sm"></div><div class="sk-line sk-line-lg"></div></div></div>
    <div class="prompt-card skeleton-card"><div class="sk-img" style="min-height:180px;"></div><div class="card-body"><div class="sk-line sk-line-sm"></div><div class="sk-line sk-line-lg"></div></div></div>
  </div>
</main>
</body>
</html>
