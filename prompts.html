<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Browse AI Prompts — PromptVault</title>
<meta name="description" content="Browse and filter AI prompts by category, AI tool, free or premium. Find the perfect prompt for Midjourney, DALL·E 3, ChatGPT and more."/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" href="https://YOUR_DOMAIN.com/prompts.html"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./css/style.css"/>
</head>
<body>

<script type="module">
// FIX: use correct param names — categoryId, subcategoryId, toolId (not cat/subcat/tool)
import { getCategories, getSubcategories, getPrompts, getTools, getAppConfig } from "./js/db.js";
import { renderPromptCard, skeletonCards, esc } from "./js/ui.js";
import { injectNav, injectFooter } from "./js/nav.js";

const params = new URLSearchParams(location.search);

// State — using correct DB param names
let filterCategoryId    = params.get("cat")    || "";
let filterSubcategoryId = params.get("subcat") || "";
let filterToolId        = params.get("tool")   || "";
let filterSearch        = params.get("q")      || "";
let filterIsPremium     = params.get("type") === "premium" ? true
                        : params.get("type") === "free"    ? false
                        : undefined;
let currentPage   = 0;
let isLoading     = false;
let totalResults  = 0;

(async () => {
  const cfg = await getAppConfig().catch(() => ({}));
  injectNav(cfg);

  const [cats, tools] = await Promise.all([
    getCategories().catch(() => []),
    getTools().catch(() => []),
  ]);

  // Set page heading from URL query
  if (filterSearch) {
    document.getElementById("page-heading").textContent = `Search: "${filterSearch}"`;
    document.title = `"${filterSearch}" Prompts — PromptVault`;
  } else if (filterCategoryId) {
    const cat = cats.find(c => c.id === filterCategoryId);
    if (cat) {
      document.getElementById("page-heading").textContent = cat.name + " Prompts";
      document.title = `${cat.name} AI Prompts — PromptVault`;
    }
  }

  // Populate filter UI
  buildCategoryChips(cats);
  buildTypeChips();
  buildToolChips(tools);

  // Load subcategories if category pre-selected
  if (filterCategoryId) {
    const subcats = await getSubcategories(filterCategoryId).catch(() => []);
    buildSubcatChips(subcats);
  }

  // Wire search bar
  const searchInput = document.getElementById("filter-search");
  if (searchInput) {
    searchInput.value = filterSearch;
    let searchTimer;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        filterSearch = searchInput.value.trim();
        resetAndLoad();
      }, 350);
    });
    searchInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { filterSearch = searchInput.value.trim(); resetAndLoad(); }
    });
  }

  // Load more button
  document.getElementById("load-more-btn")?.addEventListener("click", loadMore);

  // Initial load
  await resetAndLoad();
  injectFooter(cfg);
})();

// ── Build filter chips ────────────────────────────────────
function buildCategoryChips(cats) {
  const wrap = document.getElementById("cat-chips");
  if (!wrap) return;
  wrap.innerHTML =
    `<button class="filter-chip ${!filterCategoryId ? 'active' : ''}" onclick="selectCat('')">All</button>` +
    cats.map(c =>
      `<button class="filter-chip ${filterCategoryId === c.id ? 'active' : ''}"
         onclick="selectCat('${esc(c.id)}')">${esc(c.icon || '')} ${esc(c.name)}</button>`
    ).join("");
}

function buildSubcatChips(subcats) {
  const wrap = document.getElementById("subcat-chips");
  if (!wrap) return;
  if (!subcats.length) { wrap.innerHTML = ""; return; }
  wrap.innerHTML =
    `<button class="filter-chip ${!filterSubcategoryId ? 'active' : ''}" onclick="selectSubcat('')">All ${esc(document.getElementById("page-heading").textContent.replace(' Prompts',''))}</button>` +
    subcats.map(s =>
      `<button class="filter-chip ${filterSubcategoryId === s.id ? 'active' : ''}"
         onclick="selectSubcat('${esc(s.id)}')">${esc(s.name)}</button>`
    ).join("");
}

function buildTypeChips() {
  const wrap = document.getElementById("type-chips");
  if (!wrap) return;
  const types = [
    { label:"All",     val:undefined },
    { label:"Free",    val:false     },
    { label:"👑 Pro",  val:true      },
  ];
  wrap.innerHTML = types.map(t =>
    `<button class="filter-chip ${filterIsPremium === t.val ? 'active' : ''}"
       onclick="selectType(${t.val === undefined ? 'undefined' : t.val})">${t.label}</button>`
  ).join("");
}

function buildToolChips(tools) {
  const wrap = document.getElementById("tool-chips");
  if (!wrap || !tools.length) return;
  wrap.innerHTML =
    `<button class="filter-chip ${!filterToolId ? 'active' : ''}" onclick="selectTool('')">All Tools</button>` +
    tools.map(t =>
      `<button class="filter-chip ${filterToolId === t.id ? 'active' : ''}"
         onclick="selectTool('${esc(t.id)}')">${esc(t.icon || '')} ${esc(t.name)}</button>`
    ).join("");
}

// ── Filter actions (window-exposed for onclick) ───────────
window.selectCat = async (id) => {
  filterCategoryId    = id;
  filterSubcategoryId = "";
  // Mark chips
  document.querySelectorAll("#cat-chips .filter-chip").forEach(b => {
    b.classList.toggle("active", b.getAttribute("onclick") === `selectCat('${id}')`);
  });
  // Load subcategories
  if (id) {
    const subcats = await getSubcategories(id).catch(() => []);
    buildSubcatChips(subcats);
  } else {
    const wrap = document.getElementById("subcat-chips");
    if (wrap) wrap.innerHTML = "";
  }
  resetAndLoad();
};

window.selectSubcat = (id) => {
  filterSubcategoryId = id;
  document.querySelectorAll("#subcat-chips .filter-chip").forEach(b => {
    b.classList.toggle("active", b.getAttribute("onclick") === `selectSubcat('${id}')`);
  });
  resetAndLoad();
};

window.selectType = (val) => {
  filterIsPremium = val;
  buildTypeChips();
  resetAndLoad();
};

window.selectTool = (id) => {
  filterToolId = id;
  document.querySelectorAll("#tool-chips .filter-chip").forEach(b => {
    b.classList.toggle("active", b.getAttribute("onclick") === `selectTool('${id}')`);
  });
  resetAndLoad();
};

// ── Load / reload ─────────────────────────────────────────
async function resetAndLoad() {
  currentPage = 0;
  const grid = document.getElementById("prompts-grid");
  if (grid) grid.innerHTML = skeletonCards(6);
  document.getElementById("load-more-btn")?.classList.add("hidden");
  await loadMore(true);
}

async function loadMore(reset = false) {
  if (isLoading) return;
  isLoading = true;
  const btn  = document.getElementById("load-more-btn");
  const grid = document.getElementById("prompts-grid");
  if (btn && !reset) btn.textContent = "Loading…";

  try {
    // FIX: correct param names passed to getPrompts()
    const res = await getPrompts({
      categoryId:    filterCategoryId    || undefined,
      subcategoryId: filterSubcategoryId || undefined,
      toolId:        filterToolId        || undefined,
      search:        filterSearch        || undefined,
      isPremium:     filterIsPremium,
      page:          currentPage,
    });

    const { items, hasMore, total } = res;
    totalResults = total;

    if (reset || currentPage === 0) {
      grid.innerHTML = "";
    } else {
      // Remove any skeleton cards
      grid.querySelectorAll(".skeleton-card").forEach(s => s.remove());
    }

    if (!items.length && currentPage === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon">🔍</div>
          <h3>No prompts found</h3>
          <p style="color:var(--text2)">Try different filters or search terms.</p>
        </div>`;
    } else {
      grid.innerHTML += items.map(p => renderPromptCard(p)).join("");
      currentPage++;
    }

    // Update count
    const countEl = document.getElementById("result-count");
    if (countEl) {
      countEl.textContent = total > 0 ? `${total} prompt${total !== 1 ? "s" : ""}` : "";
    }

    // Load more button
    if (btn) {
      btn.classList.toggle("hidden", !hasMore);
      btn.textContent = "Load More Prompts";
    }
  } catch (e) {
    if (grid) grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-icon">⚠️</div>
        <p style="color:var(--text2)">Error loading prompts: ${esc(e.message)}</p>
      </div>`;
  }
  isLoading = false;
}
</script>

<!-- Page header -->
<div style="padding:80px 20px 24px;text-align:center;background:linear-gradient(180deg,var(--bg) 0%,var(--surface) 100%);">
  <h1 id="page-heading" style="font-size:clamp(24px,4vw,36px);font-weight:900;color:var(--text);margin-bottom:8px;">
    Browse AI Prompts
  </h1>
  <p style="color:var(--text2);font-size:15px;" id="result-count"></p>
</div>

<!-- Filters -->
<div class="section-inner" style="padding-top:0;">
  <!-- Search -->
  <div style="margin-bottom:16px;position:relative;">
    <input id="filter-search" type="search" placeholder="Search prompts, tools, keywords…"
      style="width:100%;padding:12px 16px 12px 44px;border:1.5px solid var(--border2);border-radius:12px;background:var(--surface);color:var(--text);font-size:14px;outline:none;box-sizing:border-box;"
      autocomplete="off"/>
    <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text2)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
  </div>

  <!-- Category chips -->
  <div style="margin-bottom:8px;">
    <p style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Category</p>
    <div class="chips-row" id="cat-chips"></div>
  </div>

  <!-- Subcategory chips -->
  <div id="subcat-chips" style="margin-bottom:8px;" class="chips-row"></div>

  <!-- Type chips -->
  <div style="margin-bottom:8px;">
    <p style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Type</p>
    <div class="chips-row" id="type-chips"></div>
  </div>

  <!-- Tool chips -->
  <div style="margin-bottom:20px;">
    <p style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">AI Tool</p>
    <div class="chips-row" id="tool-chips"></div>
  </div>

  <!-- Prompts grid -->
  <div class="prompts-grid" id="prompts-grid"></div>

  <!-- Load more -->
  <div style="text-align:center;padding:32px 0;">
    <button id="load-more-btn" class="btn-outline hidden" style="font-size:15px;padding:12px 32px;">
      Load More Prompts
    </button>
  </div>
</div>

</body>
</html>
