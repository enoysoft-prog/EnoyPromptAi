<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In / Register · PromptVault</title>
<meta name="description" content="Join PromptVault — the best AI prompt library. Create an account to save prompts, earn coins, and unlock premium content."/>
<meta name="robots" content="noindex"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./css/style.css"/>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="./index.html" style="display:inline-block;">
        <div class="icon">✨</div>
      </a>
      <h1 style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;">PromptVault</h1>
      <p style="font-size:13px;color:var(--text2);">AI Prompt Library</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Error banner -->
    <div id="auth-error" style="display:none;padding:12px 16px;background:#fef2f2;border:1.5px solid #fecaca;border-radius:10px;color:#dc2626;font-size:13px;margin-bottom:16px;"></div>

    <!-- Login form -->
    <div id="form-login">
      <div class="auth-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pw">Password</label>
          <input class="form-input" id="login-pw" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn-auth" id="btn-login">Sign In</button>
        <button type="button" onclick="showReset()" style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;text-decoration:underline;">Forgot password?</button>
      </div>
      <div class="divider" style="margin:20px 0;">or</div>
      <button class="btn-google" id="btn-google-login">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none;">
      <div class="auth-form">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full name</label>
          <input class="form-input" id="reg-name" type="text" placeholder="Your Name" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email address</label>
          <input class="form-input" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pw">Password</label>
          <input class="form-input" id="reg-pw" type="password" placeholder="Min 6 characters" autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-ref">Referral code <span style="font-size:11px;color:var(--text2);">(optional — earn bonus coins)</span></label>
          <input class="form-input" id="reg-ref" type="text" placeholder="Enter referral code" style="text-transform:uppercase;"/>
        </div>
        <button class="btn-auth" id="btn-register">Create Account</button>
      </div>
      <div class="divider" style="margin:20px 0;">or</div>
      <button class="btn-google" id="btn-google-register">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- Password reset form -->
    <div id="form-reset" style="display:none;">
      <p style="font-size:14px;color:var(--text2);margin-bottom:16px;">Enter your email address and we'll send you a reset link.</p>
      <div class="auth-form">
        <div class="form-group">
          <label class="form-label" for="reset-email">Email address</label>
          <input class="form-input" id="reset-email" type="email" placeholder="you@example.com"/>
        </div>
        <button class="btn-auth" id="btn-reset">Send Reset Email</button>
        <button type="button" onclick="switchTab('login')" style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;text-decoration:underline;">← Back to sign in</button>
      </div>
    </div>

    <p style="text-align:center;font-size:12px;color:var(--text2);margin-top:20px;">
      By continuing you agree to our <a href="#" style="color:#6366f1;">Terms</a> and <a href="#" style="color:#6366f1;">Privacy Policy</a>
    </p>
  </div>
</div>

<script type="module">
import { registerWithEmail, loginWithEmail, loginWithGoogle, resetPassword, auth } from "./js/auth.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

// Get referral from URL
const urlRef = new URLSearchParams(location.search).get("ref") || "";
if (urlRef) document.getElementById("reg-ref").value = urlRef.toUpperCase();

// Check tab from URL
const urlTab = new URLSearchParams(location.search).get("tab");
if (urlTab === "register") switchTab("register");

// Redirect if already logged in
onAuthStateChanged(auth, user => {
  if (user) {
    const redir = new URLSearchParams(location.search).get("next") || "./dashboard.html";
    window.location.href = redir;
  }
});

window.switchTab = function(tab) {
  ["login","register","reset"].forEach(t => {
    document.getElementById("form-"+t).style.display = t===tab ? "" : "none";
    const tabEl = document.getElementById("tab-"+t);
    if (tabEl) tabEl.classList.toggle("active", t===tab);
  });
  document.getElementById("auth-error").style.display = "none";
};

function showError(msg) {
  const el = document.getElementById("auth-error");
  el.textContent = msg;
  el.style.display = "";
}
window.showReset = () => {
  document.getElementById("form-login").style.display = "none";
  document.getElementById("form-register").style.display = "none";
  document.getElementById("form-reset").style.display = "";
  document.getElementById("auth-error").style.display = "none";
};

function setLoading(btn, loading) {
  btn.disabled = loading;
  btn.textContent = loading ? "Please wait…" : btn.dataset.label;
}

// ── Login ─────────────────────────────────────────────────
const btnLogin = document.getElementById("btn-login");
btnLogin.dataset.label = "Sign In";
btnLogin.addEventListener("click", async () => {
  const email = document.getElementById("login-email").value.trim();
  const pw    = document.getElementById("login-pw").value;
  if (!email || !pw) { showError("Please fill in all fields."); return; }
  setLoading(btnLogin, true);
  try {
    await loginWithEmail(email, pw);
    window.location.href = new URLSearchParams(location.search).get("next") || "./dashboard.html";
  } catch(e) {
    showError(friendlyError(e.code));
    setLoading(btnLogin, false);
  }
});

// ── Register ──────────────────────────────────────────────
const btnReg = document.getElementById("btn-register");
btnReg.dataset.label = "Create Account";
btnReg.addEventListener("click", async () => {
  const name  = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pw    = document.getElementById("reg-pw").value;
  const ref   = document.getElementById("reg-ref").value.trim().toUpperCase();
  if (!name || !email || !pw) { showError("Please fill in all required fields."); return; }
  if (pw.length < 6) { showError("Password must be at least 6 characters."); return; }
  setLoading(btnReg, true);
  try {
    await registerWithEmail(email, pw, name, ref);
    window.location.href = "./dashboard.html?welcome=1";
  } catch(e) {
    showError(friendlyError(e.code));
    setLoading(btnReg, false);
  }
});

// ── Google login ──────────────────────────────────────────
document.getElementById("btn-google-login").addEventListener("click", async () => {
  try { await loginWithGoogle(); window.location.href = "./dashboard.html"; }
  catch(e) { showError(friendlyError(e.code)); }
});
document.getElementById("btn-google-register").addEventListener("click", async () => {
  const ref = document.getElementById("reg-ref").value.trim().toUpperCase();
  try { await loginWithGoogle(ref); window.location.href = "./dashboard.html?welcome=1"; }
  catch(e) { showError(friendlyError(e.code)); }
});

// ── Password reset ────────────────────────────────────────
const btnReset = document.getElementById("btn-reset");
btnReset.dataset.label = "Send Reset Email";
btnReset.addEventListener("click", async () => {
  const email = document.getElementById("reset-email").value.trim();
  if (!email) { showError("Enter your email."); return; }
  setLoading(btnReset, true);
  try {
    await resetPassword(email);
    btnReset.textContent = "✓ Email sent!";
    btnReset.style.background = "#10b981";
  } catch(e) {
    showError(friendlyError(e.code));
    setLoading(btnReset, false);
  }
});

function friendlyError(code) {
  const map = {
    "auth/user-not-found":     "No account found with this email.",
    "auth/wrong-password":     "Incorrect password. Try again.",
    "auth/email-already-in-use": "This email is already registered. Sign in instead.",
    "auth/weak-password":      "Password is too weak. Use at least 6 characters.",
    "auth/invalid-email":      "Invalid email address.",
    "auth/popup-closed-by-user": "Google sign-in was cancelled.",
    "auth/too-many-requests":  "Too many attempts. Try again later.",
    "auth/invalid-credential": "Invalid email or password.",
  };
  return map[code] || "Something went wrong. Please try again.";
}
</script>
</body>
</html>
