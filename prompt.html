<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Prompt — PromptVault</title>
<meta name="robots" content="index, follow"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./css/style.css"/>
</head>
<body>

<script type="module">
import { getPromptById, getRelatedPrompts, getAppConfig, formatNum,
         recordUnlock, hasUnlocked } from "./js/db.js";
import { renderPromptCard, toast, copyText } from "./js/ui.js";
import { injectNav, injectFooter } from "./js/nav.js";
import { auth, onAuthStateChanged, toggleSavePrompt } from "./js/auth.js";
import { db } from "./js/firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");
if (!id) { window.location.href = "./prompts.html"; }

let currentUser    = null;
let currentProfile = null;
let promptData     = null;

(async () => {
  const cfg = await getAppConfig().catch(() => ({}));
  injectNav(cfg);

  // Load prompt
  promptData = await getPromptById(id);
  if (!promptData) {
    document.getElementById("prompt-main").innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <div style="font-size:3rem;margin-bottom:16px">🔍</div>
        <h2 style="color:var(--text)">Prompt not found</h2>
        <p style="color:var(--text2);margin:8px 0 24px">This prompt may have been removed or does not exist.</p>
        <a href="./prompts.html" class="btn-outline">← Back to Prompts</a>
      </div>`;
    return;
  }

  // Update page meta
  document.title = `${promptData.title || "Prompt"} — PromptVault`;
  document.querySelector('meta[name="description"]')?.setAttribute(
    "content", promptData.description || promptData.title || ""
  );

  // Auth state — render after we know user role
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) currentProfile = snap.data();
      } catch {}
    }
    renderPromptDetail(promptData);
  });

  // Related prompts (load in background)
  getRelatedPrompts(promptData, 4).then(related => {
    const relGrid = document.getElementById("related-grid");
    if (!relGrid) return;
    if (!related.length) {
      relGrid.parentElement.style.display = "none";
      return;
    }
    relGrid.innerHTML = related.map(p => renderPromptCard(p)).join("");
  });

  injectFooter(cfg);
})();

function getUserRole() {
  return currentProfile?.role || (currentUser ? "regular" : "guest");
}

function renderPromptDetail(p) {
  const role     = getUserRole();
  const isPro    = role === "pro" || role === "admin";
  const isPremium = !!p.isPremium;
  const locked   = isPremium && !isPro;
  const imgUrl   = p.imageUrl || `https://picsum.photos/seed/${encodeURIComponent(p.id)}/1200/630`;
  const isSaved  = currentProfile?.savedPrompts?.includes(p.id) || false;
  const dateStr  = p.createdAt?.seconds
    ? new Date(p.createdAt.seconds * 1000).toLocaleDateString("en-GB", {day:"2-digit",month:"short",year:"numeric"})
    : "";

  document.getElementById("prompt-main").innerHTML = `
    <!-- Hero image -->
    <div style="max-height:420px;overflow:hidden;border-radius:20px;margin-bottom:28px;position:relative;">
      <img src="${esc(imgUrl)}" alt="${esc(p.title)}"
           style="width:100%;height:auto;display:block;"
           onerror="this.src='https://picsum.photos/seed/${esc(p.id)}/1200/630'" loading="eager"/>
      ${isPremium ? `<div style="position:absolute;top:16px;right:16px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;padding:6px 14px;border-radius:20px;font-weight:800;font-size:13px;">👑 Premium</div>` : ""}
    </div>

    <!-- Header -->
    <div style="margin-bottom:20px;">
      ${p.categoryName ? `<p style="font-size:13px;color:var(--text2);margin-bottom:6px;">${esc(p.categoryName)}${p.subcategoryName ? " › " + esc(p.subcategoryName) : ""}</p>` : ""}
      <h1 style="font-size:clamp(22px,4vw,32px);font-weight:900;color:var(--text);line-height:1.2;margin-bottom:10px;">${esc(p.title || "Untitled")}</h1>
      ${p.description ? `<p style="font-size:15px;color:var(--text2);line-height:1.6;">${esc(p.description)}</p>` : ""}
    </div>

    <!-- Meta row -->
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;align-items:center;">
      ${p.tool ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--surface2);border-radius:20px;font-size:13px;color:var(--text2);">🤖 ${esc(p.tool)}</span>` : ""}
      ${dateStr ? `<span style="font-size:13px;color:var(--text2);">📅 ${dateStr}</span>` : ""}
      ${p.views  ? `<span style="font-size:13px;color:var(--text2);">👁 ${formatNum(p.views)} views</span>` : ""}
      ${p.likes  ? `<span style="font-size:13px;color:var(--text2);">❤ ${formatNum(p.likes)} likes</span>` : ""}
      ${Array.isArray(p.tags) && p.tags.length
        ? p.tags.map(t => `<span style="padding:4px 10px;background:var(--surface2);border-radius:20px;font-size:12px;color:var(--text2);">#${esc(t)}</span>`).join("")
        : ""}
    </div>

    <!-- Action buttons -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;">
      ${currentUser ? `
        <button id="btn-save" onclick="handleSave()"
          style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text);">
          ${isSaved ? "🔖 Saved" : "🔖 Save Prompt"}
        </button>` : `
        <a href="./auth.html?next=prompt.html%3Fid%3D${esc(p.id)}"
          style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;">
          🔖 Save Prompt
        </a>`}
      <a href="./prompts.html${p.categoryId ? '?cat='+esc(p.categoryId) : ''}"
        style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;font-size:14px;font-weight:600;color:var(--text);text-decoration:none;">
        ← Back to Prompts
      </a>
    </div>

    <!-- Prompt content -->
    ${locked ? renderLockedGate(p) : renderPromptContent(p)}
  `;
}

function renderPromptContent(p) {
  return `
    <div style="background:var(--surface2);border:1.5px solid var(--border2);border-radius:16px;padding:24px;margin-bottom:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <h2 style="font-size:16px;font-weight:700;color:var(--text);">📋 Prompt</h2>
        <button id="btn-copy"
          onclick="handleCopy()"
          style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">
          📋 Copy Prompt
        </button>
      </div>
      <pre id="prompt-text"
        style="white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:14px;line-height:1.7;color:var(--text);margin:0;user-select:text;">${esc(p.content || "")}</pre>
    </div>`;
}

function renderLockedGate(p) {
  if (!currentUser) {
    // Not logged in
    return `
      <div style="background:linear-gradient(135deg,#1e1b4b,#3730a3);border-radius:16px;padding:32px;text-align:center;color:#fff;margin-bottom:24px;">
        <div style="font-size:40px;margin-bottom:12px;">🔒</div>
        <h3 style="font-size:20px;font-weight:800;margin-bottom:8px;">Premium Prompt</h3>
        <p style="opacity:.8;font-size:14px;margin-bottom:24px;">Create a free account and upgrade to Pro to unlock all premium prompts.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="./auth.html?tab=register&next=prompt.html%3Fid%3D${esc(p.id)}"
            style="padding:12px 24px;background:#fff;color:#4f46e5;border-radius:12px;font-weight:800;font-size:14px;text-decoration:none;">Create Free Account</a>
          <a href="./auth.html?next=prompt.html%3Fid%3D${esc(p.id)}"
            style="padding:12px 24px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;">Sign In</a>
        </div>
      </div>`;
  }
  // Logged in but not Pro
  return `
    <div style="background:linear-gradient(135deg,#1e1b4b,#3730a3);border-radius:16px;padding:32px;text-align:center;color:#fff;margin-bottom:24px;">
      <div style="font-size:40px;margin-bottom:12px;">⭐</div>
      <h3 style="font-size:20px;font-weight:800;margin-bottom:8px;">Pro Feature</h3>
      <p style="opacity:.8;font-size:14px;margin-bottom:24px;">Upgrade to Pro to unlock all premium prompts and access exclusive content.</p>
      <a href="./dashboard.html#upgrade"
        style="display:inline-block;padding:12px 28px;background:#fff;color:#4f46e5;border-radius:12px;font-weight:800;font-size:15px;text-decoration:none;">⭐ Upgrade to Pro</a>
    </div>`;
}

// ── Copy handler ──────────────────────────────────────────
window.handleCopy = async function() {
  const text = promptData?.content;
  if (!text) return;
  const btn = document.getElementById("btn-copy");
  await copyText(text, btn);
};

// ── Save handler ──────────────────────────────────────────
window.handleSave = async function() {
  if (!currentUser) { window.location.href = `./auth.html?next=prompt.html%3Fid%3D${id}`; return; }
  const btn = document.getElementById("btn-save");
  if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
  try {
    const isSaved = await toggleSavePrompt(currentUser.uid, id);
    if (btn) { btn.disabled = false; btn.textContent = isSaved ? "🔖 Saved" : "🔖 Save Prompt"; }
    toast(isSaved ? "Saved to your collection!" : "Removed from saved");
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = "🔖 Save Prompt"; }
    toast(e.message, "error");
  }
};

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>

<div id="prompt-main" style="max-width:860px;margin:0 auto;padding:80px 20px 40px;">
  <div style="text-align:center;padding:60px 0;color:var(--text2);">
    <div style="width:40px;height:40px;border:3px solid rgba(99,102,241,.3);border-top-color:#6366f1;border-radius:50%;animation:pvSpin 1s linear infinite;margin:0 auto 16px;"></div>
    Loading prompt…
  </div>
</div>

<!-- Related prompts -->
<div id="related-section" style="max-width:1100px;margin:0 auto;padding:0 20px 60px;">
  <h2 style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:20px;">Related Prompts</h2>
  <div class="prompts-grid" id="related-grid"></div>
</div>

<style>
  @keyframes pvSpin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
